name: Build Android APK

on:

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. 设置 Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. 自动生成现代、无错的 Android 项目骨架
      - name: Create Flutter Scaffolding
        run: |
          flutter create --platforms=android --org com.example .

      # 5. 用 Python 动态修改安卓配置 (注入存储权限、修改应用名称、强升 compileSdk 至 36)
      - name: Patch Android Configs
        run: |
          python3 -c "
          import os

          # === 1. 修复 AndroidManifest.xml (权限与名称) ===
          manifest_path = 'android/app/src/main/AndroidManifest.xml'
          if os.path.exists(manifest_path):
              with open(manifest_path, 'r', encoding='utf-8') as f:
                  content = f.read()

              permissions = '''
                  <uses-permission android:name='android.permission.MANAGE_EXTERNAL_STORAGE' />
                  <uses-permission android:name='android.permission.READ_EXTERNAL_STORAGE'/>
                  <uses-permission android:name='android.permission.WRITE_EXTERNAL_STORAGE'/>
              '''
              
              if 'MANAGE_EXTERNAL_STORAGE' not in content:
                  content = content.replace(
                      '<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\">',
                      '<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\">\n' + permissions
                  )

              if 'android:requestLegacyExternalStorage' not in content:
                  content = content.replace(
                      '<application',
                      '<application android:requestLegacyExternalStorage=\"true\"'
                  )

              content = content.replace('android:label=\"pro_code_extractor\"', 'android:label=\"代码提取器\"')
              content = content.replace('android:label=\"pro_code_extractor_android\"', 'android:label=\"代码提取器\"')

              with open(manifest_path, 'w', encoding='utf-8') as f:
                  f.write(content)
              print('AndroidManifest.xml patched successfully!')

          # === 2. 修复 build.gradle (强制将 compileSdk 提升至 36 解决编译版本冲突) ===
          gradle_path = 'android/app/build.gradle'
          if os.path.exists(gradle_path):
              with open(gradle_path, 'r', encoding='utf-8') as f:
                  gradle_content = f.read()

              # 替换 compileSdk 定义以满足最新 lifecycle 依赖
              gradle_content = gradle_content.replace('compileSdk = flutter.compileSdkVersion', 'compileSdk = 36')
              gradle_content = gradle_content.replace('compileSdkVersion flutter.compileSdkVersion', 'compileSdkVersion 36')

              with open(gradle_path, 'w', encoding='utf-8') as f:
                  f.write(gradle_content)
              print('build.gradle patched with compileSdk = 36!')
          "

      # 6. 使用 Python 本地绘制生成高清图标
      - name: Generate Launcher Icon Source
        run: |
          pip install Pillow
          python3 -c "
          import os
          from PIL import Image, ImageDraw
          
          os.makedirs('assets', exist_ok=True)
          img = Image.new('RGB', (512, 512), color='#2196F3')
          d = ImageDraw.Draw(img)
          d.rounded_rectangle([64, 64, 448, 448], radius=40, fill='white')
          d.rectangle([128, 160, 384, 200], fill='#2196F3')
          d.rectangle([128, 240, 320, 280], fill='#2196F3')
          d.rectangle([128, 320, 224, 360], fill='#2196F3')
          img.save('assets/icon.png')
          print('Icon generated successfully!')
          "

      # 7. 安装依赖
      - name: Install dependencies
        run: flutter pub get

      # 8. 自动为 Android 平台生成适配的所有尺寸图标
      - name: Generate Icons
        run: flutter pub run flutter_launcher_icons

      # 9. 编译 Release APK
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # 10. 规范化 APK 文件名称
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/CodeExtractor_v1.0.0.apk

      # 11. 上传重命名后的 APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeExtractor_Android_Installation_File
          path: build/app/outputs/flutter-apk/CodeExtractor_v1.0.0.apk
