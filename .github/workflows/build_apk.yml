name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # 1. 拉取仓库
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # 2. Java 17
      # =========================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      # =========================
      # 3. Flutter
      # =========================
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # =========================
      # 4. Flutter 信息
      # =========================
      - name: Flutter Doctor
        run: flutter doctor -v

      # =========================
      # 5. 如果没有 android 工程则自动创建
      # =========================
      - name: Create Android Project If Missing
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android --org com.example .
          fi

      # =========================
      # 6. 生成图标源文件 (提前执行)
      # =========================
      - name: Generate Launcher Icon Source
        run: |
          pip install Pillow

          python3 - - <<'PY'
          import os
          from PIL import Image
          from PIL import ImageDraw

          os.makedirs('assets', exist_ok=True)

          img = Image.new('RGB', (512, 512), '#2196F3')

          d = ImageDraw.Draw(img)

          d.rounded_rectangle(
              [64, 64, 448, 448],
              radius=50,
              fill='white'
          )

          d.rectangle([120,160,392,200], fill='#2196F3')
          d.rectangle([120,250,320,290], fill='#2196F3')
          d.rectangle([120,340,220,380], fill='#2196F3')

          img.save('assets/icon.png')

          print("Icon generated")
          PY

      # =========================
      # 7. 安装依赖
      # =========================
      - name: Install Dependencies
        run: flutter pub get

      # =========================
      # 8. 生成 App 图标
      # =========================
      - name: Generate App Icons
        run: flutter pub run flutter_launcher_icons

      # =========================
      # 9. 清理缓存 (在修改安卓配置和缓存之前，先把它清干净)
      # =========================
      - name: Flutter Clean
        run: flutter clean

      # =========================
      # 10. 重新获取依赖 (此时会将所有插件下载至全局 pub-cache 缓存中)
      # =========================
      - name: Pub Get Again
        run: flutter pub get

      # =========================
      # 11. 修复 Android 配置与全局缓存 (穿透式直接修改本地和 pub-cache 中的 Gradle 配置)
      # =========================
      - name: Patch Android Configs
        run: |
          python3 -c "
          import os
          import re

          # --------------------------------------------------
          # 1. 修复本地 AndroidManifest.xml (权限与名称)
          # --------------------------------------------------
          manifest_path = 'android/app/src/main/AndroidManifest.xml'
          if os.path.exists(manifest_path):
              with open(manifest_path, 'r', encoding='utf-8') as f:
                  content = f.read()

              permissions = '''
              <uses-permission android:name=\"android.permission.MANAGE_EXTERNAL_STORAGE\"/>
              <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\"/>
              <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\"/>
              '''

              if 'MANAGE_EXTERNAL_STORAGE' not in content:
                  content = content.replace(
                      '<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\">',
                      '<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\">\n' + permissions
                  )

              if 'requestLegacyExternalStorage' not in content:
                  content = content.replace(
                      '<application',
                      '<application android:requestLegacyExternalStorage=\"true\"'
                  )

              content = content.replace('android:label=\"pro_code_extractor\"', 'android:label=\"代码提取器\"')
              content = content.replace('android:label=\"pro_code_extractor_android\"', 'android:label=\"代码提取器\"')

              with open(manifest_path, 'w', encoding='utf-8') as f:
                  f.write(content)
              print(\"Local AndroidManifest.xml patched successfully\")

          # --------------------------------------------------
          # 2. 修复本地 build.gradle 和 local.properties
          # --------------------------------------------------
          gradle_files = [
              'android/app/build.gradle',
              'android/app/build.gradle.kts',
              'android/build.gradle',
              'android/build.gradle.kts'
          ]

          for gradle_path in gradle_files:
              if not os.path.exists(gradle_path):
                  continue
              with open(gradle_path, 'r', encoding='utf-8') as f:
                  content = f.read()

              content = re.sub(r'compileSdk\s*=\s*flutter\.compileSdkVersion', 'compileSdk = 36', content)
              content = re.sub(r'compileSdkVersion\s+flutter\.compileSdkVersion', 'compileSdkVersion 36', content)
              content = re.sub(r'targetSdk\s*=\s*flutter\.targetSdkVersion', 'targetSdk = 36', content)
              content = re.sub(r'targetSdkVersion\s+flutter\.targetSdkVersion', 'targetSdkVersion 36', content)

              if 'compileSdk = 36' not in content and 'compileSdkVersion 36' not in content:
                  content = re.sub(r'android\s*\{', 'android {\n    compileSdk = 36', content, count=1)

              with open(gradle_path, 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f\"Local gradle file patched: {gradle_path}\")

          # 写入本地 local.properties
          local_props_path = 'android/local.properties'
          with open(local_props_path, 'a', encoding='utf-8') as f:
              f.write('\\nflutter.compileSdkVersion=36\\nflutter.targetSdkVersion=36\\n')
          print(\"Local local.properties patched\")

          # --------------------------------------------------
          # 3. 强力穿透：直接扫描并修改全局 pub-cache 中所有第三方插件的 Gradle 配置文件
          # --------------------------------------------------
          pub_cache_path = os.path.expanduser('~/.pub-cache')
          if os.path.exists(pub_cache_path):
              print(f\"Scanning and patching pub-cache at: {pub_cache_path}\")
              patched_count = 0
              for root, dirs, files in os.walk(pub_cache_path):
                  for file in files:
                      if file in ['build.gradle', 'build.gradle.kts']:
                          gradle_path = os.path.join(root, file)
                          try:
                              with open(gradle_path, 'r', encoding='utf-8') as f:
                                  content = f.read()

                              # 使用正则表达式，强行将插件内的任何 compileSdk/targetSdk 版本号改写为 36
                              new_content = re.sub(r'compileSdkVersion\s*=?\s*(\d+|flutter\.compileSdkVersion)', 'compileSdkVersion 36', content)
                              new_content = re.sub(r'compileSdk\s*=?\s*(\d+|flutter\.compileSdkVersion)', 'compileSdk = 36', new_content)
                              new_content = re.sub(r'targetSdkVersion\s*=?\s*(\d+|flutter\.targetSdkVersion)', 'targetSdkVersion 36', new_content)
                              new_content = re.sub(r'targetSdk\s*=?\s*(\d+|flutter\.targetSdkVersion)', 'targetSdk = 36', new_content)

                              if new_content != content:
                                  with open(gradle_path, 'w', encoding='utf-8') as f:
                                      f.write(new_content)
                                  patched_count += 1
                          except Exception:
                              pass
              print(f\"Successfully patched {patched_count} cached plugin Gradle files!\")

          # --------------------------------------------------
          # 4. 优化本地 gradle.properties
          # --------------------------------------------------
          gradle_prop = 'android/gradle.properties'
          extra_props = '''
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m
          org.gradle.daemon=true
          org.gradle.parallel=true
          org.gradle.configureondemand=true
          '''
          if os.path.exists(gradle_prop):
              with open(gradle_prop, 'a', encoding='utf-8') as f:
                  f.write(extra_props)
              print(\"gradle.properties optimized\")
          "

      # =========================
      # 12. 编译 APK (此时 pub-cache 源码已被重置，直接编译必然成功)
      # =========================
      - name: Build APK
        run: |
          flutter build apk \
          --release \
          --no-tree-shake-icons

      # =========================
      # 13. 重命名 APK
      # =========================
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/CodeExtractor_v1.0.0.apk

      # =========================
      # 14. 上传 APK
      # =========================
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeExtractor_Android_Installation_File
          path: build/app/outputs/flutter-apk/CodeExtractor_v1.0.0.apk
