name: Build Android APK

on:

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 创建资源目录并在线下载精美图标 (免费开源的代码文件夹图标)
      - name: Download Launcher Icon
        run: |
          mkdir -p assets
          curl -L -o assets/icon.png "https://raw.githubusercontent.com/primer/octicons/main/icons/file-directory-symlink-24.png"
          # 如果上述图标连接较慢，也可以使用此备用地址（一个精美的高清代码盒子图标）：
          # curl -L -o assets/icon.png "https://cdn-icons-png.flaticon.com/512/606/606263.png"

      # 3. 设置 Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. 设置 Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 5. 安装依赖
      - name: Install dependencies
        run: flutter pub get

      # 6. 自动为 Android 平台生成适配的所有尺寸图标
      - name: Generate Icons
        run: flutter pub run flutter_launcher_icons

      # 7. 编译 Release APK
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # 8. 规范化 APK 文件名称
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/CodeExtractor_v1.0.0.apk

      # 9. 上传重命名后的 APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeExtractor_Android_Installation_File # 网页端下载时的文件夹名
          path: build/app/outputs/flutter-apk/CodeExtractor_v1.0.0.apk
