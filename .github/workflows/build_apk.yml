name: Build Android APK

on:

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 本地动态生成 512x512 的精美“代码文件”图标 (不依赖网络，100% 稳定)
      - name: Generate Launcher Icon Source
        run: |
          mkdir -p assets
          convert -size 512x512 xc:#2196F3 \
            -fill white -draw "roundrectangle 64,64 448,448 40,40" \
            -fill #2196F3 -draw "rectangle 128,160 384,200" \
            -fill #2196F3 -draw "rectangle 128,240 320,280" \
            -fill #2196F3 -draw "rectangle 128,320 224,360" \
            assets/icon.png

      # 3. 设置 Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. 设置 Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 5. 安装依赖
      - name: Install dependencies
        run: flutter pub get

      # 6. 自动为 Android 平台生成适配的所有尺寸图标
      - name: Generate Icons
        run: flutter pub run flutter_launcher_icons

      # 7. 编译 Release APK
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # 8. 规范化 APK 文件名称
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/CodeExtractor_v1.0.0.apk

      # 9. 上传重命名后的 APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeExtractor_Android_Installation_File
          path: build/app/outputs/flutter-apk/CodeExtractor_v1.0.0.apk
