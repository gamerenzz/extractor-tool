name: Build Android APK

on:

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 使用 Python 本地绘制生成高清图标 (极为稳定且不依赖系统预装工具)
      - name: Generate Launcher Icon via Python
        run: |
          pip install Pillow
          python3 -c "
          import os
          from PIL import Image, ImageDraw
          
          # 创建资源目录
          os.makedirs('assets', exist_ok=True)
          
          # 创建 512x512 蓝色画布
          img = Image.new('RGB', (512, 512), color='#2196F3')
          d = ImageDraw.Draw(img)
          
          # 绘制白色圆角矩形卡片
          d.rounded_rectangle([64, 64, 448, 448], radius=40, fill='white')
          
          # 绘制三条代表代码行的蓝色横线
          d.rectangle([128, 160, 384, 200], fill='#2196F3')
          d.rectangle([128, 240, 320, 280], fill='#2196F3')
          d.rectangle([128, 320, 224, 360], fill='#2196F3')
          
          # 保存为标准 PNG 图标
          img.save('assets/icon.png')
          print('Icon generated successfully!')
          "

      # 3. 设置 Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. 设置 Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 5. 安装依赖
      - name: Install dependencies
        run: flutter pub get

      # 6. 自动为 Android 平台生成适配的所有尺寸图标
      - name: Generate Icons
        run: flutter pub run flutter_launcher_icons

      # 7. 编译 Release APK
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # 8. 规范化 APK 文件名称
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/CodeExtractor_v1.0.0.apk

      # 9. 上传重命名后的 APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeExtractor_Android_Installation_File
          path: build/app/outputs/flutter-apk/CodeExtractor_v1.0.0.apk
