name: pro_code_extractor
description: A professional code extractor tool for Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.0.1           # 修复此处版本号报错
  permission_handler: ^11.3.1
  fast_gbk: ^1.0.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1 # 引入云端图标自动生成插件

# 配置应用图标生成路径
flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icon.png" # 图标源文件路径

flutter:
  uses-material-design: true
